{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}SR Finance{% endblock %}</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Segoe UI', sans-serif;
}

body{
background:linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c');
background-size:cover;
background-position:center;
color:white;
}

/* SIDEBAR */
.sidebar{
width:240px;
height:100vh;
background:rgba(0,0,0,0.7);
backdrop-filter: blur(10px);
position:fixed;
padding:20px;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
font-weight:600;
}

.sidebar a{
display:block;
padding:12px;
margin:8px 0;
color:#ccc;
text-decoration:none;
border-radius:6px;
transition:0.3s;
}

.sidebar a:hover{
background:#4CAF50;
color:white;
}

/* CONTENT */
.content{
margin-left:240px;
min-height:100vh;
}

/* TOPBAR */
.topbar{
height:70px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 30px;
background:rgba(0,0,0,0.5);
backdrop-filter: blur(10px);
}

/* CONTAINER */
.container{
padding:30px;
}

/* HERO TITLE */
.hero-title{
font-size:32px;
font-weight:600;
margin-bottom:10px;
}

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:rgba(255,255,255,0.1);
backdrop-filter: blur(12px);
padding:20px;
border-radius:12px;
box-shadow:0 4px 20px rgba(0,0,0,0.3);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

/* FORMS */
input{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:6px;
outline:none;
}

button{
margin-top:10px;
padding:10px;
border:none;
border-radius:6px;
background:#4CAF50;
color:white;
cursor:pointer;
}

button:hover{
background:#43a047;
}

/* TABLE */
table{
width:100%;
margin-top:20px;
border-collapse:collapse;
background:rgba(255,255,255,0.1);
backdrop-filter: blur(10px);
border-radius:10px;
overflow:hidden;
}

th, td{
padding:12px;
text-align:left;
}

th{
background:rgba(255,255,255,0.2);
}

tr:hover{
background:rgba(255,255,255,0.1);
}

/* MOBILE */
@media(max-width:768px){
.sidebar{
width:200px;
}
.content{
margin-left:200px;
}
}

</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>SR FINANCE</h2>

    <a href="{% url 'dashboard' %}">Dashboard</a>
    <a href="{% url 'income' %}">Income</a>
    <a href="{% url 'expenses' %}">Expenses</a>
    <a href="{% url 'loans' %}">Loans</a>
    <a href="{% url 'reports' %}">Reports</a>
</div>

<!-- MAIN -->
<div class="content">

    <!-- TOPBAR -->
    <div class="topbar">
        <div>Welcome, {{ request.user.username }}</div>

        <div>
            <a href="/profile/" style="color:white;">Profile</a>
            <a href="/logout/" style="color:white; margin-left:15px;">Logout</a>
        </div>
    </div>

    <!-- CONTENT -->
    <div class="container">
        {% block content %}{% endblock %}
    </div>

</div>

<!-- JS -->
<script>

// Highlight active link
const links = document.querySelectorAll(".sidebar a");

links.forEach(link => {
    if (link.href === window.location.href) {
        link.style.background = "#4CAF50";
        link.style.color = "white";
    }
});

// Confirm delete
document.addEventListener("DOMContentLoaded", function () {
    const deleteButtons = document.querySelectorAll(".btn-delete");

    deleteButtons.forEach(btn => {
        btn.addEventListener("click", function (e) {
            if (!confirm("Delete this item?")) {
                e.preventDefault();
            }
        });
    });
});

</script>

</body>
</html>
