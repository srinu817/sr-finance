{% extends 'dashboard/base.html' %}

{% block content %}

<div class="page-header">
    <h1>Add Loan</h1>
</div>

<div class="dashboard-grid">

    <div class="card">

        <h3>New Loan</h3>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>Person Name</label>
                <input type="text" name="person" placeholder="Enter name" required>
            </div>

            <div class="form-group">
                <label>Total Amount</label>
                <input type="number" name="total_amount" placeholder="Enter amount" required>
            </div>

            <div class="form-group">
                <label>Paid Amount</label>
                <input type="number" name="paid_amount" placeholder="Enter paid amount">
            </div>

            <div class="form-group">
                <label>Date</label>
                <input type="date" name="date" required>
            </div>

            <button type="submit" class="btn">Add Loan</button>

        </form>

    </div>

</div>

{% endblock %}
