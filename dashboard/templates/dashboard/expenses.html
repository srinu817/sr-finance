{% extends 'dashboard/base.html' %}

{% block content %}

<style>
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.btn-add{padding:10px 16px;background:linear-gradient(135deg,#ef4444,#dc2626);border-radius:10px;border:none;color:white;cursor:pointer;}
.summary-card{display:flex;align-items:center;gap:15px;background:linear-gradient(135deg,#2b0000,#7f1d1d);padding:20px;border-radius:14px;box-shadow:0 0 20px rgba(239,68,68,0.2);margin-bottom:20px;}
.summary-icon{width:50px;height:50px;border-radius:12px;background:#ef4444;display:flex;align-items:center;justify-content:center;font-size:22px;}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:none;justify-content:center;align-items:center;}
.modal-content{width:420px;background:#1a1a1a;padding:20px;border-radius:12px;}
.modal-content input{width:100%;padding:10px;margin-top:8px;background:#2a2a2a;border:none;color:white;border-radius:6px;}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
</style>

<div class="page-header">
    <h1>Expenses</h1>
    <button class="btn-add" onclick="openModal()">+ Add Expense</button>
</div>

<div class="summary-card">
    <div class="summary-icon">💸</div>
    <div>
        <div>Total Expense</div>
        <h2>₹{{ total_expense }}</h2>
    </div>
</div>

<div class="card">
<table>
<tr><th>Title</th><th>Amount</th><th>Date</th><th>Action</th></tr>

{% for e in expenses %}
<tr>
<td>{{ e.title }}</td>
<td>₹{{ e.amount }}</td>
<td>{{ e.date }}</td>
<td>
<form method="POST" action="{% url 'delete_expense' e.id %}">
{% csrf_token %}
<button class="btn-delete">Delete</button>
</form>
</td>
</tr>
{% endfor %}

</table>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">

<form method="POST">
{% csrf_token %}

<input type="text" name="title" placeholder="Title" required>

<div class="modal-grid">
<input type="number" name="amount" placeholder="Amount" required>
<input type="date" name="date" required>
</div>

<input type="text" name="category" placeholder="Category">

<button>Add Expense</button>

</form>

</div>
</div>

<script>
function openModal(){document.getElementById("modal").style.display="flex";}
</script>

{% endblock %}
