{% extends 'dashboard/base.html' %}

{% block content %}

<style>
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.btn-add{padding:10px 16px;background:linear-gradient(135deg,#f97316,#ea580c);border:none;border-radius:10px;color:white;}
.summary-card{display:flex;align-items:center;gap:15px;background:linear-gradient(135deg,#2e1065,#6b21a8);padding:20px;border-radius:14px;margin-bottom:20px;}
.summary-icon{width:50px;height:50px;background:#a855f7;border-radius:12px;display:flex;align-items:center;justify-content:center;}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:none;justify-content:center;align-items:center;}
.modal-content{width:420px;background:#1a1a1a;padding:20px;border-radius:12px;}
.modal-content input{width:100%;padding:10px;margin-top:8px;background:#2a2a2a;border:none;color:white;border-radius:6px;}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
</style>

<div class="page-header">
    <h1>Loans</h1>
    <button class="btn-add" onclick="openModal()">+ Add Loan</button>
</div>

<div class="summary-card">
    <div class="summary-icon">🏦</div>
    <div>
        <div>Total Loan</div>
        <h2>₹{{ total_loan }}</h2>
    </div>
</div>

<div class="card">
<table>
<tr>
<th>Person</th>
<th>Total</th>
<th>Paid</th>
<th>Status</th>
<th>Action</th>
</tr>

{% for l in loans %}
<tr>
<td>{{ l.person }}</td>
<td>₹{{ l.total_amount }}</td>
<td>₹{{ l.paid_amount }}</td>
<td>{{ l.status }}</td>

<td>
<form method="POST" action="{% url 'delete_loan' l.id %}">
{% csrf_token %}
<button class="btn-delete">Delete</button>
</form>
</td>
</tr>
{% endfor %}

</table>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">

<form method="POST">
{% csrf_token %}

<input type="text" name="person" placeholder="Person Name" required>

<div class="modal-grid">
<input type="number" name="total_amount" placeholder="Total Amount" required>
<input type="number" name="paid_amount" placeholder="Paid Amount">
</div>

<input type="date" name="date">

<button>Add Loan</button>

</form>

</div>
</div>

<script>
function openModal(){document.getElementById("modal").style.display="flex";}
</script>

{% endblock %}
