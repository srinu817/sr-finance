{% extends 'dashboard/base.html' %}

{% block content %}

<h1>Dashboard</h1>

<div class="cards">

<div class="card">
<h3>Wallet</h3>
<div class="amount">₹{{ wallet }}</div>
</div>

<div class="card">
<h3>Income</h3>
<div class="amount">₹{{ total_income }}</div>
</div>

<div class="card">
<h3>Expenses</h3>
<div class="amount">₹{{ total_expense }}</div>
</div>

<div class="card">
<h3>Loans</h3>
<div class="amount">₹{{ total_loan }}</div>
</div>

</div>

{% endblock %}
