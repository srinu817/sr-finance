{% extends 'dashboard/base.html' %}

{% block content %}

<div class="page-header">
    <h1>Profile Settings</h1>
</div>

<div class="dashboard-grid">

    <!-- LEFT PROFILE CARD -->
    <div class="card" style="text-align:center;">

        <div style="font-size:40px; margin-bottom:10px;">👤</div>

        <h3>{{ request.user.username }}</h3>
        <p style="opacity:0.7;">{{ request.user.email }}</p>

        <br>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <button class="btn-primary">Update Profile Picture</button>
        </form>

    </div>

    <!-- RIGHT SETTINGS -->
    <div class="card">

        <form method="POST">
            {% csrf_token %}

            <div class="dashboard-grid">

                <!-- NAME -->
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" name="username" value="{{ request.user.username }}">
                </div>

                <!-- EMAIL -->
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" value="{{ request.user.email }}">
                </div>

                <!-- PHONE -->
                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" name="phone" placeholder="+91 9876543210">
                </div>

                <!-- CURRENCY -->
                <div class="form-group">
                    <label>Currency</label>
                    <input type="text" name="currency" value="Indian Rupee (INR)">
                </div>

            </div>

            <br>

            <button class="btn-primary">Save Preferences</button>

        </form>

        <hr>

        <!-- CHANGE PASSWORD -->
        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>Change Password</label>
                <input type="password" name="password" placeholder="New Password">
            </div>

            <button class="btn">Update Password</button>

        </form>

        <hr>

        <!-- DELETE ACCOUNT -->
        <form method="POST" action="{% url 'delete_account' %}">
            {% csrf_token %}
            <button class="btn btn-danger">Delete Account</button>
        </form>

    </div>

</div>

{% endblock %}
